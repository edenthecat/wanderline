server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large audio file uploads through the proxy
    client_max_body_size 50m;

    # Re-resolve Docker DNS on each request so backend IP changes are picked up
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:3001;

    # Proxy API requests to the backend service. The `^~` modifier
    # makes this prefix win over the `~* \.(js|css|...)$` regex
    # location below — without it, nginx prefers the regex match for
    # asset-extension paths like /api/_player/index-*.css, treats them
    # as static files in /usr/share/nginx/html (which obviously aren't
    # there), and returns 404 to the browser even though a curl
    # straight to the backend works. Same hazard for any future
    # /api/* path that ends in .js/.css/etc.
    location ^~ /api/ {
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
