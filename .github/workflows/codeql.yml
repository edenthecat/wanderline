name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 7 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          output: sarif-results
          upload: never

      # SARIF artifact is always available for inspection, even without GHAS.
      - name: Upload SARIF as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results
          retention-days: 7

      # SARIF upload to the Security tab requires GitHub Advanced Security on
      # private repos. Until GHAS is enabled (or the repo is made public), this
      # upload will fail — don't let that block PRs. Real analysis failures
      # still fail the job above. Drop continue-on-error once code scanning is
      # available.
      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: sarif-results
          category: '/language:${{ matrix.language }}'
